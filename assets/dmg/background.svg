  <text x="460" y="92" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, SF Pro Text, Helvetica Neue, Arial" font-size="13" font-weight="500" fill="#a9bac4" letter-spacing="0.3">Drag the app into Applications</text>

