  <circle cx="240" cy="220" r="168" fill="url(#cyanGlow)" filter="url(#blur20)"/>
  <circle cx="680" cy="220" r="168" fill="url(#violetGlow)" filter="url(#blur20)"/>
  <path d="M0 356C128 304 254 326 395 368C552 414 720 398 920 314V440H0Z" fill="#56dce8" opacity="0.035"/>

