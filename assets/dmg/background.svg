<svg xmlns="http://www.w3.org/2000/svg" width="920" height="440" viewBox="0 0 920 440">
  <defs>
    <radialGradient id="bgGlow" cx="52%" cy="18%" r="82%">
      <stop offset="0" stop-color="#365d6c"/>
      <stop offset="0.34" stop-color="#142936"/>
      <stop offset="0.76" stop-color="#08131b"/>
      <stop offset="1" stop-color="#05090f"/>
